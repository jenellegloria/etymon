<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etymon — My Stats</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F7F4; --bg2: #EFEFEC; --ink: #111010;
    --ink-mid: #5A5755; --ink-light: #AAA8A4; --border: #E0DDD8;
    --r0:#C026D3; --r1:#EA580C; --r2:#65A30D; --r3:#7C3AED; --r4:#DB2777;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  nav {
    width: 100%; border-bottom: 1px solid var(--border);
    padding: 1.1rem 1.5rem; display: flex; align-items: center;
    justify-content: space-between; max-width: 900px; margin: 0 auto;
  }
  .wordmark { font-size:.85rem; font-weight:600; letter-spacing:.18em; text-transform:uppercase; text-decoration:none; color:var(--ink); }
  .play-today { font-size:.78rem; font-weight:500; color:var(--ink-mid); text-decoration:none; border:1.5px solid var(--border); border-radius:20px; padding:.3rem .85rem; transition:all .15s; }
  .play-today:hover { border-color:var(--ink-mid); color:var(--ink); }

  .hero { max-width:900px; margin:0 auto; padding:3.5rem 1.5rem 2rem; border-bottom:1px solid var(--border); }
  .hero-eyebrow { font-size:.7rem; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-light); margin-bottom:.6rem; }
  .hero-title { font-family:'Instrument Serif',serif; font-size:clamp(2.2rem,6vw,4rem); font-weight:400; line-height:1.1; margin-bottom:.75rem; }
  .hero-sub { font-size:.88rem; color:var(--ink-mid); line-height:1.65; }

  .content { max-width:900px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }

  /* STAT CARDS */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 3rem;
  }
  .stat-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
    animation: fadeUp .4s ease both;
  }
  .stat-value {
    font-family: 'Instrument Serif', serif;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--ink);
    margin-bottom: .3rem;
  }
  .stat-label {
    font-size: .7rem;
    color: var(--ink-light);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* GAME HISTORY */
  .section-title {
    font-size: .7rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 1rem;
  }

  .game-list { display: flex; flex-direction: column; gap: 0; }

  .game-row {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 0 1.2rem;
    align-items: center;
    padding: 1rem 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp .4s ease both;
  }
  .game-row:first-child { padding-top: 0; }

  .game-id {
    font-family: 'Instrument Serif', serif;
    font-size: 1.6rem;
    color: var(--ink-light);
    line-height: 1;
    text-align: right;
  }

  .game-details {}
  .game-date { font-size: .68rem; color: var(--ink-light); margin-bottom: .2rem; }
  .game-words { font-size: .8rem; color: var(--ink-mid); }
  .game-words span { color: var(--ink); font-weight: 500; }

  .game-score {
    font-family: 'Instrument Serif', serif;
    font-size: 1.5rem;
    color: var(--ink);
    text-align: right;
    white-space: nowrap;
  }
  .game-score-label { font-size: .62rem; color: var(--ink-light); text-align: right; letter-spacing: .06em; }

  .root-pills { display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .3rem; }
  .root-pill {
    font-size: .6rem;
    font-weight: 600;
    letter-spacing: .06em;
    padding: .15rem .45rem;
    border-radius: 20px;
    border: 1.5px solid;
  }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 4rem 1.5rem; }
  .empty p { font-size:.88rem; color:var(--ink-light); font-style:italic; }

  /* FOOTER */
  footer { border-top:1px solid var(--border); padding:1.5rem; text-align:center; font-size:.72rem; color:var(--ink-light); letter-spacing:.04em; max-width:900px; margin:0 auto; }
  footer a { color:var(--ink-light); text-decoration:none; }
  footer a:hover { color:var(--ink); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  @media(max-width:520px) {
    nav { padding:1rem; }
    .hero { padding:2rem 1rem 1.5rem; }
    .content { padding:1.5rem 1rem 3rem; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .game-row { grid-template-columns: 44px 1fr auto; }
  }
</style>
</head>
<body>

<nav>
  <a class="wordmark" href="index.html">Etymon</a>
  <a class="play-today" href="index.html">Play today →</a>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Personal</div>
  <h1 class="hero-title">My stats</h1>
  <p class="hero-sub" id="hero-sub">Stats are stored locally on this device.</p>
</div>

<div class="content" id="content"></div>

<footer>
  <a href="index.html">Etymon</a> · <a href="archive.html">Archive</a> · Stats are private and stored only on your device
</footer>

<script>
const COLORS = [
  { hex: '#C026D3', pale: '#FAE8FF' },
  { hex: '#EA580C', pale: '#FFF0E6' },
  { hex: '#65A30D', pale: '#ECFCCB' },
  { hex: '#7C3AED', pale: '#EDE9FE' },
  { hex: '#DB2777', pale: '#FCE7F3' },
];

function render() {
  const content = document.getElementById('content');

  // ── COLLECT DATA ────────────────────────────────────────────────
  const streakData = JSON.parse(localStorage.getItem('etymon_streak') || '{}');
  const currentStreak = streakData.streak || 0;

  // Scan all localStorage keys for game saves (etymon_YYYY-MM-DD)
  const games = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key.startsWith('etymon_') || key === 'etymon_streak') continue;
    try {
      const data = JSON.parse(localStorage.getItem(key));
      if (!data || !data.done) continue; // only count completed games
      const dateStr = key.replace('etymon_', '');
      const wordsFound = Object.values(data.foundByRoot || {}).reduce((s, arr) => s + arr.length, 0);
      const score = Object.values(data.foundByRoot || {}).reduce((s, arr) => s + arr.reduce((ss, e) => ss + e.pts, 0), 0)
                  + (data.selfDiscovered || []).length * 3;
      const rootNames = Object.keys(data.foundByRoot || {});
      games.push({
        key,
	id: data.id,
        dateStr,
        date: new Date(dateStr + 'T12:00:00'),
        score,
        wordsFound,
        selfDiscovered: (data.selfDiscovered || []).length,
        rootsFound: Object.entries(data.foundByRoot || {}).filter(([,v]) => v.length > 0).length,
        totalRoots: rootNames.length,
        foundByRoot: data.foundByRoot || {},
      });
    } catch(e) {}
  }

  // Sort newest first
  games.sort((a, b) => b.date - a.date);

  if (!games.length && currentStreak === 0) {
    content.innerHTML = '<div class="empty"><p>No completed games yet. Play today\'s puzzle to get started!</p></div>';
    return;
  }

  // ── COMPUTE SUMMARY STATS ───────────────────────────────────────
  const totalGames = games.length;
  const totalScore = games.reduce((s, g) => s + g.score, 0);
  const bestScore = games.length ? Math.max(...games.map(g => g.score)) : 0;
  const totalWords = games.reduce((s, g) => s + g.wordsFound, 0);
  const avgScore = totalGames ? Math.round(totalScore / totalGames) : 0;

  // ── STAT CARDS ──────────────────────────────────────────────────
  const stats = [
    { value: currentStreak > 0 ? `🔥 ${currentStreak}` : '—', label: 'day streak' },
    { value: totalGames, label: 'puzzles completed' },
    { value: bestScore || '—', label: 'best score' },
    { value: avgScore || '—', label: 'avg score' },
    { value: totalWords, label: 'words found' },
  ];

  const gridHTML = `<div class="stat-grid">${
    stats.map((s, i) => `
      <div class="stat-card" style="animation-delay:${i * 0.06}s">
        <div class="stat-value">${s.value}</div>
        <div class="stat-label">${s.label}</div>
      </div>`).join('')
  }</div>`;

  // ── GAME HISTORY ────────────────────────────────────────────────
  let historyHTML = '';
  if (games.length) {
    const rows = games.map((g, idx) => {
      const dateLabel = g.date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const rootPills = Object.entries(g.foundByRoot)
        .filter(([, v]) => v.length > 0)
        .map(([ri, words]) => {
          const c = COLORS[parseInt(ri)] || COLORS[0];
          const star = g.selfDiscovered > 0 ? '' : '';
          return `<span class="root-pill" style="background:${c.pale};color:${c.hex};border-color:${c.hex}">
            ${words.length} word${words.length !== 1 ? 's' : ''}
          </span>`;
        }).join('');

      const selfLabel = g.selfDiscovered > 0
        ? ` · 🌟 ${g.selfDiscovered} self-discovered`
        : '';

      return `
        <div class="game-row" style="animation-delay:${idx * 0.04}s">
          <div class="game-id">${g.id || '?'}</div>
          <div class="game-details">
            <div class="game-date">${dateLabel}</div>
            <div class="game-words"><span>${g.wordsFound}</span> words · <span>${g.rootsFound}</span> of ${g.totalRoots} roots${selfLabel}</div>
            <div class="root-pills">${rootPills}</div>
          </div>
          <div>
            <div class="game-score">${g.score}</div>
            <div class="game-score-label">pts</div>
          </div>
        </div>`;
    }).join('');

    historyHTML = `
      <div class="section-title">Game history</div>
      <div class="game-list">${rows}</div>`;
  }

  content.innerHTML = gridHTML + historyHTML;
}

render();
</script>
</body>
</html>
