<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Etymon — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F8F7F4;
    --bg2: #EFEFEC;
    --ink: #111010;
    --ink-mid: #5A5755;
    --ink-light: #AAA8A4;
    --border: #E0DDD8;
    --r0:#C026D3; --r0p:#FAE8FF;
    --r1:#EA580C; --r1p:#FFF0E6;
    --r2:#65A30D; --r2p:#ECFCCB;
    --r3:#7C3AED; --r3p:#EDE9FE;
    --r4:#DB2777; --r4p:#FCE7F3;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    width: 100%;
    border-bottom: 1px solid var(--border);
    padding: 1.1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 900px;
    margin: 0 auto;
  }

  .wordmark {
    font-size: .85rem;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--ink);
  }

  .play-today {
    font-size: .78rem;
    font-weight: 500;
    color: var(--ink-mid);
    text-decoration: none;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: .3rem .85rem;
    transition: all .15s;
  }

  .play-today:hover { border-color: var(--ink-mid); color: var(--ink); }

  /* HERO */
  .hero {
    max-width: 900px;
    margin: 0 auto;
    padding: 3.5rem 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
  }

  .hero-eyebrow {
    font-size: .7rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: .6rem;
  }

  .hero-title {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--ink);
    margin-bottom: .75rem;
  }

  .hero-sub {
    font-size: .88rem;
    color: var(--ink-mid);
    max-width: 480px;
    line-height: 1.65;
  }

  /* ARCHIVE GRID */
  .archive {
    max-width: 900px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* PUZZLE ENTRY */
  .puzzle-entry {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0 1.5rem;
    padding: 1.75rem 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .puzzle-entry:first-child { padding-top: 0; }

  .entry-num {
    padding-top: .3rem;
    text-align: right;
  }

  .num-big {
    font-family: 'Instrument Serif', serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--ink-light);
  }

  .num-date {
    font-size: .62rem;
    color: var(--ink-light);
    letter-spacing: .05em;
    margin-top: .2rem;
    display: block;
  }

  .entry-body {}

  .entry-word {
    font-family: 'DM Sans', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 600;
    letter-spacing: -.02em;
    line-height: 1;
    margin-bottom: .6rem;
  }
  .entry-word .seg-root { /* colored by inline style */ }
  .entry-word .seg-gray { color: #C0BDB8; }

  /* Root pills */
  .entry-roots {
    display: flex;
    flex-wrap: wrap;
    gap: .35rem;
    margin-bottom: 1rem;
  }

  .entry-root {
    display: flex;
    flex-direction: column;
    padding: .38rem .72rem;
    border-radius: 8px;
    border: 1.5px solid;
  }

  .entry-root-name {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: .2rem;
  }

  .entry-root-meaning {
    font-size: .7rem;
    font-weight: 400;
    font-style: italic;
    opacity: .72;
    line-height: 1.2;
  }

  /* Coined words */
  .coined-label {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: .5rem;
  }

  .coined-list {
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }

  .coined-item {
    display: flex;
    align-items: baseline;
    gap: .5rem;
    flex-wrap: wrap;
  }

  .coined-word {
    font-family: 'Instrument Serif', serif;
    font-size: 1.15rem;
    font-style: italic;
    color: var(--ink);
  }

  .coined-def {
    font-size: .8rem;
    color: var(--ink-mid);
    line-height: 1.4;
  }

  .coined-author {
    font-size: .68rem;
    color: var(--ink-light);
    white-space: nowrap;
  }

  /* No coined words state */
  .no-coins {
    font-size: .8rem;
    color: var(--ink-light);
    font-style: italic;
  }

  .entry-note {
    margin-top: .85rem;
    font-size: .72rem;
    color: var(--ink-light);
    font-style: italic;
    line-height: 1.6;
    padding-left: .7rem;
    border-left: 2px solid var(--border);
  }

  /* Stats row */
  .entry-stats {
    display: flex;
    gap: 1.25rem;
    margin-top: .85rem;
    padding-top: .75rem;
    border-top: 1px solid var(--border);
  }

  .estat {
    font-size: .72rem;
    color: var(--ink-light);
  }

  .estat span {
    font-family: 'Instrument Serif', serif;
    font-size: 1rem;
    color: var(--ink);
    margin-right: .2rem;
  }

  /* EMPTY STATE */
  .empty-state {
    max-width: 900px;
    margin: 4rem auto;
    padding: 0 1.5rem;
    text-align: center;
  }

  .empty-state p {
    font-size: .88rem;
    color: var(--ink-light);
    font-style: italic;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem;
    text-align: center;
    font-size: .72rem;
    color: var(--ink-light);
    letter-spacing: .04em;
    max-width: 900px;
    margin: 0 auto;
  }

  footer a { color: var(--ink-light); text-decoration: none; }
  footer a:hover { color: var(--ink); }

  @media (max-width: 520px) {
    .puzzle-entry { grid-template-columns: 56px 1fr; gap: 0 1rem; }
    .num-big { font-size: 1.4rem; }
    nav { padding: 1rem; }
    .hero { padding: 2rem 1rem 1.5rem; }
    .archive { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<nav>
  <a class="wordmark" href="index.html">Etymon</a>
  <a class="play-today" href="index.html">Play today →</a>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Archive</div>
  <h1 class="hero-title">Past puzzles</h1>
  <p class="hero-sub">Here are the past puzzles so far, and the words submitted that really should exist.</p>
</div>

<div class="archive" id="archive"></div>

<footer>
  <a href="index.html">Etymon</a> · A daily etymology game · <a href="index.html">Play today</a>
</footer>

<script>
// ─────────────────────────────────────────────────────────────────
// ARCHIVE DATA
// To update: paste a new entry object at the TOP of this array.
// Each entry added after the day ends — include the best coined words
// from that day's Formspree submissions.
//
// TEMPLATE (copy this, fill it in, paste at top of array):
//
// {
//   id: 4,                          // puzzle number
//   date: "March 9, 2026",          // display date
//   word: "TELESCOPE",              // the target word
//   roots: [
//     { name: "TELE-", meaning: "far off, at a distance", color: 0 },
//     { name: "-SCOPE", meaning: "to look at, observe", color: 1 },
//   ],
//   coins: [
//     { word: "teleblind", def: "the inability to see what is right in front of you", author: "anonymous" },
//   ],
// },
//
// ─────────────────────────────────────────────────────────────────

const ARCHIVE = [

  // ↓↓↓ PASTE NEW ENTRIES AT THE TOP ↓↓↓
{
    id: 3,
    date: "March 11, 2026",
    word: "ARTIFICIAL",
    segments: [
      { text: "ART", ri: 4 },
      { text: "I", ri: -1 },
      { text: "FIC", ri: 0 },
      { text: "IAL", ri: 0 },
    ],
    roots: [
      { name: "ART-", meaning: "skill, craft, art", color: 2 },
      { name: "-FIC-", meaning: "to make, do (from Latin *facere*)", color: 3 },
    ],
    topScore: 153,

    coins: [
      { word: "artifictitious", def: "Something made by a fictional character" },
      { word: "artefactual", def: "A fact that has since been disproven by science" },
      { word: "farticle", def: "a poorly written article"},
      { word: "defarticial", def: "something that is really really unpleasantly artificial" },
      { word: "artstruct", def: "the skillful rearrangement of parts into a structure", author: "anonymous" }
    ],
  },
{
    id: 2,
    date: "March 10, 2026",
    word: "CORPUSCLE",
    segments: [
      { text: "CORPUS", ri: 2 },
      { text: "CLE", ri: 3 },
    ],
    roots: [
      { name: "CORPUS-", meaning: "body", color: 2 },
      { name: "-CLE", meaning: "little", color: 3 },
    ],
    topScore: 54,

    coins: [
      { word: "corpsacle", def: "a debacle involving lots of dead bodies", author: "anonymous" }
    ],
  },
  {
    id: 1,
    date: "March 9, 2026",
    word: "OBFUSCATE",
    segments: [
      { text: "OB", ri: 0 },
      { text: "FUSC", ri: 1 },
      { text: "ATE", ri: -1 },
    ],
    roots: [
      { name: "OB-", meaning: "against, toward, in the way of", color: 0 },
      { name: "FUSC-", meaning: "to darken, make dusky", color: 1 },
    ],
    topScore: 82,
    note: "Note: the version live on Day 1 incorrectly listed FUS- (to pour, from Latin fundere) as a root. FUSC- (dark, from Latin fuscus) and FUS- are unrelated — they just look alike. The archive reflects the corrected etymology.",
    coins: [
      { word: "obfuscnym", def: "a name that blocks understanding of the thing it's naming", author: "anonymous" }
    ],
  },

  // ↑↑↑ PASTE NEW ENTRIES AT THE TOP ↑↑↑

];

// ─────────────────────────────────────────────────────────────────
// COLORS (don't need to edit this)
const COLORS = [
  { cls: 'r0', hex: '#C026D3', pale: '#FAE8FF' },
  { cls: 'r1', hex: '#EA580C', pale: '#FFF0E6' },
  { cls: 'r2', hex: '#65A30D', pale: '#ECFCCB' },
  { cls: 'r3', hex: '#7C3AED', pale: '#EDE9FE' },
  { cls: 'r4', hex: '#DB2777', pale: '#FCE7F3' },
];

function renderWord(entry) {
  if (!entry.segments || !entry.segments.length) return entry.word;
  return entry.segments.map(seg => {
    if (seg.ri === -1) return `<span class="seg-gray">${seg.text}</span>`;
    const c = COLORS[entry.roots[seg.ri] ? entry.roots.findIndex((_,i) => i === seg.ri) : 0];
    const color = (COLORS[seg.ri] || COLORS[0]).hex;
    return `<span class="seg-root" style="color:${color}">${seg.text}</span>`;
  }).join('');
}

function render() {
  const container = document.getElementById('archive');

  if (!ARCHIVE.length) {
    container.innerHTML = '<div class="empty-state"><p>No past puzzles yet. Check back tomorrow.</p></div>';
    return;
  }

  ARCHIVE.forEach((entry, idx) => {
    const el = document.createElement('div');
    el.className = 'puzzle-entry';
    el.style.animationDelay = `${idx * 0.06}s`;

    // Root pills HTML
    const rootsHTML = entry.roots.map(r => {
      const c = COLORS[r.color] || COLORS[0];
      return `<span class="entry-root" style="background:${c.pale};color:${c.hex};border-color:${c.hex}">
        <span class="entry-root-name">${r.name}</span>
        ${r.meaning ? `<span class="entry-root-meaning">${r.meaning}</span>` : ''}
      </span>`;
    }).join('');

    // Coined words HTML
    let coinedHTML = '';
    if (entry.coins && entry.coins.length > 0) {
      const items = entry.coins.map(c => `
        <div class="coined-item">
          <span class="coined-word">${c.word}</span>
          <span class="coined-def">${c.def}</span>
          ${c.author ? `<span class="coined-author">— ${c.author}</span>` : ''}
        </div>
      `).join('');
      coinedHTML = `<div class="coined-label">Words coined</div><div class="coined-list">${items}</div>`;
    } else {
      coinedHTML = `<div class="coined-label">Words coined</div><div class="no-coins">None submitted yet.</div>`;
    }

    // Stats HTML
	let statsHTML = '';
	if (entry.topScore != null) {
  	statsHTML = `<div class="entry-stats"><div class="estat"><span>${entry.topScore}</span>high score</div></div>`;
	}
    const noteHTML = entry.note
      ? `<div class="entry-note">${entry.note}</div>`
      : '';

    el.innerHTML = `
      <div class="entry-num">
        <div class="num-big">${entry.id}</div>
        <span class="num-date">${entry.date}</span>
      </div>
      <div class="entry-body">
        <div class="entry-word">${renderWord(entry)}</div>
        <div class="entry-roots">${rootsHTML}</div>
        ${coinedHTML}
        ${statsHTML}
        ${noteHTML}
      </div>
    `;

    container.appendChild(el);
  });
}

render();
</script>
</body>
</html>
